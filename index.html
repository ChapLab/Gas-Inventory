<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChapLab Tanks</title>
</head>
<body>
<h2>ChapLab Tank Scanner</h2>

<input id="scriptUrlInput" placeholder="Paste Apps Script URL">
<button onclick="saveScriptUrl(document.getElementById('scriptUrlInput').value)">Connect</button>

<br><br>

<input id="manualBarcodeInput" placeholder="Enter barcode">
<button onclick="handleBarcode(document.getElementById('manualBarcodeInput').value)">Scan</button>

<div id="scanResult"></div>

<script src="app.js"></script>
<script>
function saveScriptUrl(url){
  localStorage.setItem("gasTankScriptUrl", url);
}

function getScriptUrl(){
  return localStorage.getItem("gasTankScriptUrl");
}

let tanks = [];

async function load(){
  const data = await api("list");
  tanks = data.tanks || [];
}

load();

function handleBarcode(code){
  const found = tanks.find(t => t.Barcode == code);
  if(found){
    document.getElementById("scanResult").innerHTML = "FOUND: " + found["Gas"];
  } else {
    document.getElementById("scanResult").innerHTML = "NEW TANK";
  }
}
</script>
</body>
</html>
