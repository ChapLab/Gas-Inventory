<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChapLab Tanks</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

<h1>ChapLab Tanks</h1>

<div class="field">
<label>Gas</label>
<div class="input-with-button">
<input id="addGas" list="gasOptions">
<button onclick="triggerDropdown('addGas')">▼</button>
</div>
</div>

<div class="field">
<label>Room</label>
<div class="input-with-button">
<input id="addRoom" list="roomOptions">
<button onclick="triggerDropdown('addRoom')">▼</button>
</div>
</div>

<div class="field">
<label>Position</label>
<div class="input-with-button">
<input id="addPosition" list="positionOptions">
<button onclick="triggerDropdown('addPosition')">▼</button>
</div>
</div>

<datalist id="gasOptions"></datalist>
<datalist id="roomOptions"></datalist>
<datalist id="positionOptions"></datalist>

<script src="app.js"></script>
</body>
</html>
